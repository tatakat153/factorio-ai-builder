[mod-setting-name]
ai-builder-bridge-info=Bridge Connection
ai-builder-bridge-info-description=AI bridge service connection info.\nFormat: bridge_host:port | RCON_host:port\nTo change, edit bridge/config.ini and restart the bridge service.\nThis value is display-only.

ai-builder-model-hint=AI Model Hint
ai-builder-model-hint-description=This mod does not run AI itself. AI reasoning happens externally (HanaAgent plugin).\nRecommended setup:\n• Planner role: strong reasoning model — reads map, analyzes recipes, outputs build plans\n• Executor role: cheap fast model — walks, places entities, polls batch progress\nThe two roles can use different API providers to reduce token costs. Configured in HanaAgent only.

ai-builder-biter-immunity=Agent Biter Immunity
ai-builder-biter-immunity-description=When enabled, the AI character takes zero damage from hostile forces (melee biters, ranged spitters, worms).\nDamage events from enemy forces are intercepted and health is restored to full.\nDoes not affect other damage sources (trains, self-inflicted, falling).\nDisable this if you want to test AI behavior under combat conditions.\nDefault: On.

ai-builder-movement-stuck-threshold=Movement Stuck Threshold
ai-builder-movement-stuck-threshold-description=Number of consecutive ticks with position change < 0.1 tiles before the agent is declared stuck.\nWhen stuck, the agent will attempt to re-path up to 3 times. After 3 failures, it reports as stuck to AI for decision.\n• Lower (e.g. 60 ticks = 1 sec): faster detection, better for dense factory areas\n• Higher (e.g. 300 ticks = 5 sec): fewer false positives, better for open terrain long-distance travel\nDefault: 120 ticks (~2 sec at 60 UPS).\nRange: 30 – 600.

ai-builder-batch-placements-per-tick=Batch Placements Per Tick
ai-builder-batch-placements-per-tick-description=Maximum entities placed per tick during template-based batch building.\nBatch building is used for repetitive construction (e.g. 8 furnaces + belts + inserters + power poles).\n• Lower (1–2): smoother build process, minimal FPS impact, good for older hardware\n• Higher (5–10): faster construction, but higher instantaneous computation load\n• Max 20: near-instant completion, recommended only on high-performance machines\nNote: actual placement speed is also limited by character distance to build site.\nDefault: 3.\nRange: 1 – 20.

ai-builder-overview-chunk-size=Overview Chunk Size
ai-builder-overview-chunk-size-description=Tile size of each grid cell when AI queries map overview (factorio_get_overview).\nEach cell returns resource types with estimated amounts and building types with counts.\n• Lower (e.g. 16): finer grid, more spatial detail for AI\n• Higher (e.g. 64): coarser grid, less data transferred, lower AI token cost\nData volume scales roughly with (query_radius / chunk_size)².\nDoes not affect zone detail queries (factorio_get_area_detail), which always return compressed precise entity lists.\nDefault: 32 tiles (2×2 native Factorio chunks).\nRange: 8 – 128.

ai-builder-debug-mode=Debug Mode
ai-builder-debug-mode-description=When enabled, the mod outputs detailed runtime logs to the Factorio console (press ~ to open).\nIncludes:\n• Agent creation and destruction\n• Path planning and waypoint transitions\n• Batch build progress and obstacle detection\n• Zone mark creation and removal\n• Biter immunity triggers\n• Configuration reloads\nLog prefix: [AI-Builder] for easy filtering.\nRecommended only for troubleshooting or development. Keep off for normal play.\nDefault: Off.

[mod-name]
factorio-ai-builder=Factorio AI Builder

[mod-description]
factorio-ai-builder=AI-controlled construction agent. Supports sparse map perception, template-based batch building, area marking, and emergency stop. Requires bridge service and AI agent plugin.

[entity-name]
ai-builder-agent=AI Builder Agent
