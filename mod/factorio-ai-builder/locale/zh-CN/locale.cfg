[mod-setting-name]
ai-builder-bridge-info=桥接连接
ai-builder-bridge-info-description=AI 桥接服务的连接信息。\n地址格式：bridge_host:port | RCON_host:port\n如需修改，编辑 bridge/config.ini 后重启桥接服务。\n当前值仅为显示，不可在此修改。

ai-builder-model-hint=AI 模型提示
ai-builder-model-hint-description=此 Mod 本身不运行 AI，AI 推理在外部（HanaAgent 插件）完成。\n推荐配置：\n• Planner（规划角色）：用强推理模型，负责查看地图、分析配方链、输出建造方案\n• Executor（执行角色）：用便宜快速模型，负责走路、放实体、轮询批量进度\n两个角色可用不同 API，降低 token 成本。仅在 HanaAgent 中生效。

ai-builder-biter-immunity=虫子免疫
ai-builder-biter-immunity-description=开启后，AI 角色完全不受敌对生物伤害（包括近战虫子、远程喷吐虫、沙虫）。\n伤害事件会被拦截并回满血量。\n不影响其他伤害来源（火车、自己手雷、坠落等）。\n如需测试 AI 在战斗中的行为，可关闭此选项。\n默认：开启。

ai-builder-movement-stuck-threshold=卡墙判定时间
ai-builder-movement-stuck-threshold-description=AI 角色在行走过程中，若连续此 tick 数位置未变化（移动距离 < 0.1 格），则判定为卡住。\n卡住后自动重新寻路，最多尝试 3 次。3 次均失败则标记为 stuck 并汇报给 AI 决策。\n• 降低此值（如 60 tick = 1 秒）：更快检测卡墙，适合工厂密集区域\n• 提高此值（如 300 tick = 5 秒）：减少误判，适合开阔地带长距离行走\n默认：120 tick（60 UPS 下约 2 秒）。\n范围：30 – 600。

ai-builder-batch-placements-per-tick=批量建造速度
ai-builder-batch-placements-per-tick-description=批量建造（模板展开的重复铺设）时，每 tick 最多放置的实体数量。\n批量建造用于一次放置大量同类建筑（如 8 个熔炉+配套传送带+爪子+电线杆）。\n• 降低此值（如 1-2）：建造过程更平滑，不影响游戏帧率，适合老旧设备\n• 提高此值（如 5-10）：建造速度更快，但瞬时计算量大，可能导致短暂卡顿\n• 最大 20：几乎瞬间完成，仅推荐在高性能设备上使用\n注意：实际放置速度还受角色与建造点的距离限制。\n默认：3。\n范围：1 – 20。

ai-builder-overview-chunk-size=概览区块大小
ai-builder-overview-chunk-size-description=AI 调用概览查询（factorio_get_overview）时，地图被划分为此大小的方块网格。\n每个方块返回该区域内的资源种类和估算量、建筑类型和数量。\n• 降低此值（如 16）：区块更小更密，AI 获得更精细的空间信息\n• 提高此值（如 64）：区块更大更稀，减少传输数据量和 AI token 消耗\n数据量大致正比于 (查询半径 / chunk_size)²。\n此设置不影响圈地详情查询（factorio_get_area_detail），详情查询永远返回压缩后的精确实体列表。\n默认：32 tile（相当于 2×2 个 Factorio 原生 chunk）。\n范围：8 – 128。

ai-builder-debug-mode=调试模式
ai-builder-debug-mode-description=开启后，Mod 会在 Factorio 控制台（按 ~ 打开）输出详细运行日志。\n包括：\n• 角色创建/销毁\n• 行走路径规划与路点切换\n• 批量建造的进度与障碍检测\n• 区域标记的创建与删除\n• 虫子免疫触发\n• 配置重载\n日志前缀为 [AI-Builder]，方便过滤。\n仅在排查问题或开发时建议开启，日常使用保持关闭以减少控制台噪音。\n默认：关闭。

[mod-name]
factorio-ai-builder=Factorio AI 建造助手

[mod-description]
factorio-ai-builder=AI 控制的建造代理。支持稀疏地图感知、模板批量建造、区域标记、紧急停止。需要桥接服务和 AI 代理插件配合使用。

[entity-name]
ai-builder-agent=AI 建造助手
