# Factorio AI Builder - Bridge Configuration
# Edit this file to change RCON connection parameters

[factorio]
# Factorio RCON host (use the machine's IP where Factorio runs)
host = 127.0.0.1
# RCON port (must match config.ini local-rcon-socket port)
port = 34198
# RCON password (must match config.ini local-rcon-password)
password = factorio

[bridge]
# Bridge HTTP API port
port = 9380
# Bind address (0.0.0.0 = all interfaces, 127.0.0.1 = local only)
host = 0.0.0.0
